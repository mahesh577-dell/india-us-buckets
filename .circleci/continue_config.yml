version: 2.1

# =================================================================
# STAGE 2 of 2 - this is where the real work happens.
#
# This file never runs by itself - .circleci/config.yml (stage 1)
# always runs first, decides which environment(s) changed, and then
# hands off to this file. See the comment at the top of config.yml
# for the full picture.
#
# NOTE ON PARAMETER NAMES: everything below is prefixed "sel_"
# (sel_region, sel_environment, ...). That's deliberate - see the
# note near the top of config.yml explaining why this file can't
# reuse config.yml's parameter names directly.
#
# THREE WAYS THIS FILE GETS USED:
#
#  A) AUTOMATIC (on every push) - stage 1 detected that files under
#     environments/<region>/<env>/ changed, so it set a matching
#     boolean parameter (e.g. run-india-tms-dev) to true. That
#     environment's workflow below runs by itself - no clicking
#     needed. If you change files in 2 different environments in one
#     push, BOTH of their workflows run side by side.
#
#  B) MANUAL, single environment - open CircleCI -> "Trigger
#     Pipeline" -> set:
#       manual_trigger = true
#       region         = india (or us)
#       environment    = tms-dev (or any other)
#     -> runs validate/plan/apply for exactly that one environment,
#     regardless of what files changed.
#
#  C) MANUAL, bootstrap a project - "Trigger Pipeline" -> set:
#       run_bootstrap = true
#       region        = india (or us)
#       bootstrap_env = tms-dev (or any other)
#     -> one-time setup for that project: enables its APIs, creates
#     its state bucket, creates its dedicated service account.
#     See README.md "Bootstrap" section before you use this.
#
# WHY MOST FILES HERE END IN /main.tf, /variables.tf etc:
#     Every job below just does `cd environments/<region>/<env>` and
#     runs plain `terraform init/plan/apply` - there is no magic.
#     If you can run terraform by hand, you can read every step here.
# =================================================================

parameters:
  # ---- Passthrough from config.yml --------------------------------
  # CircleCI automatically forwards the original trigger parameters
  # to the continued pipeline. These are declared here ONLY to
  # prevent "Unexpected argument" rejection - they are never used
  # in any job or workflow below.
  manual_trigger:
    type: boolean
    default: false
  region:
    type: enum
    enum: [india, us]
    default: india
  environment:
    type: enum
    enum:
      - host-dev
      - host-staging
      - host-prod
      - tms-dev
      - vms-dev
      - analytics-dev
      - tms-staging
      - vms-staging
      - tms-prod
      - vms-prod
      - analytics-prod
    default: host-dev
  run_bootstrap:
    type: boolean
    default: false
  bootstrap_env:
    type: enum
    enum:
      - host-dev
      - host-staging
      - host-prod
      - tms-dev
      - vms-dev
      - analytics-dev
      - tms-staging
      - vms-staging
      - tms-prod
      - vms-prod
      - analytics-prod
    default: host-dev

  # ---- Manual, single-environment trigger (see use case B above) ----
  sel_manual_trigger:
    type: boolean
    default: false
  sel_region:
    type: enum
    enum: [india, us]
    default: india
  sel_environment:
    type: enum
    enum:
      - host-dev
      - host-staging
      - host-prod
      - tms-dev
      - vms-dev
      - analytics-dev
      - tms-staging
      - vms-staging
      - tms-prod
      - vms-prod
      - analytics-prod
    default: host-dev
  # Actual on-disk path for sel_region/sel_environment, e.g.
  # "in/dev/in-tms-dev". Computed by config.yml (stage 1) since the
  # folder layout (dev/staging/prod nesting + in-/us- prefixes +
  # "-network" suffix on host) can't be built by simple string
  # concatenation of sel_region/sel_environment alone.
  sel_env_path:
    type: string
    default: "in/dev/in-host-dev-network"

  # ---- Manual bootstrap trigger (see use case C above) ----
  sel_run_bootstrap:
    type: boolean
    default: false
  sel_bootstrap_env:
    type: enum
    enum:
      - host-dev
      - host-staging
      - host-prod
      - tms-dev
      - vms-dev
      - analytics-dev
      - tms-staging
      - vms-staging
      - tms-prod
      - vms-prod
      - analytics-prod
    default: host-dev

  # ---- Automatic, one boolean per environment (see use case A) ----
  # stage 1 (config.yml) flips these to true based on changed files.
  # You never need to set these by hand.
  run-india-host-dev:
    type: boolean
    default: false
  run-india-host-staging:
    type: boolean
    default: false
  run-india-host-prod:
    type: boolean
    default: false
  run-india-tms-dev:
    type: boolean
    default: false
  run-india-vms-dev:
    type: boolean
    default: false
  run-india-analytics-dev:
    type: boolean
    default: false
  run-india-tms-staging:
    type: boolean
    default: false
  run-india-vms-staging:
    type: boolean
    default: false
  run-india-tms-prod:
    type: boolean
    default: false
  run-india-vms-prod:
    type: boolean
    default: false
  run-india-analytics-prod:
    type: boolean
    default: false
  run-us-host-dev:
    type: boolean
    default: false
  run-us-host-staging:
    type: boolean
    default: false
  run-us-host-prod:
    type: boolean
    default: false
  run-us-tms-dev:
    type: boolean
    default: false
  run-us-vms-dev:
    type: boolean
    default: false
  run-us-analytics-dev:
    type: boolean
    default: false
  run-us-tms-staging:
    type: boolean
    default: false
  run-us-vms-staging:
    type: boolean
    default: false
  run-us-tms-prod:
    type: boolean
    default: false
  run-us-vms-prod:
    type: boolean
    default: false
  run-us-analytics-prod:
    type: boolean
    default: false

executors:
  tf-executor:
    docker:
      - image: hashicorp/terraform:1.9.0
    working_directory: ~/project
    environment:
      TF_CLI_ARGS: "-no-color"
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json

commands:
  setup-gcp:
    steps:
      - run:
          name: Load GCP service account key
          command: printf '%s' "$GOOGLE_CREDENTIALS" > /tmp/gcp-key.json

jobs:
  # ---- Reusable jobs, called once per environment with different
  #      "env_path" / "context_name" values. This is the ONLY place
  #      terraform commands actually live. ----
  validate:
    executor: tf-executor
    parameters:
      env_path: { type: string }
    steps:
      - checkout
      - setup-gcp
      - run:
          name: "terraform init - << parameters.env_path >>"
          command: |
            cd environments/<< parameters.env_path >>
            terraform init -input=false
      - run:
          name: terraform fmt -check (whole repo)
          command: terraform fmt -check -recursive
      - run:
          name: "terraform validate - << parameters.env_path >>"
          command: |
            cd environments/<< parameters.env_path >>
            terraform validate

  plan:
    executor: tf-executor
    parameters:
      env_path: { type: string }
    steps:
      - checkout
      - setup-gcp
      - run:
          name: "terraform init - << parameters.env_path >>"
          command: |
            cd environments/<< parameters.env_path >>
            terraform init -input=false
      - run:
          name: "terraform plan - << parameters.env_path >>"
          command: |
            cd environments/<< parameters.env_path >>
            terraform plan -var-file="terraform.tfvars" -out=tfplan -input=false
      - run:
          name: Show plan (read this before approving!)
          command: |
            cd environments/<< parameters.env_path >>
            terraform show -no-color tfplan
      - persist_to_workspace:
          root: .
          paths:
            - environments/<< parameters.env_path >>/tfplan
            - environments/<< parameters.env_path >>/.terraform
            - environments/<< parameters.env_path >>/.terraform.lock.hcl

  apply:
    executor: tf-executor
    parameters:
      env_path: { type: string }
    steps:
      - checkout
      - setup-gcp
      - attach_workspace:
          at: .
      - run:
          name: "terraform apply - << parameters.env_path >>"
          command: |
            cd environments/<< parameters.env_path >>
            terraform apply -auto-approve -input=false tfplan
      - run:
          name: Show outputs
          command: |
            cd environments/<< parameters.env_path >>
            terraform output

  bootstrap:
    executor: tf-executor
    steps:
      - checkout
      - setup-gcp
      - run:
          name: "Bootstrap plan - << pipeline.parameters.sel_region >>-<< pipeline.parameters.sel_bootstrap_env >>"
          command: |
            cd terraform/bootstrap
            mkdir -p states
            terraform init -input=false
            terraform plan \
              -state="states/<< pipeline.parameters.sel_region >>-<< pipeline.parameters.sel_bootstrap_env >>.tfstate" \
              -var-file="projects/<< pipeline.parameters.sel_region >>-<< pipeline.parameters.sel_bootstrap_env >>.tfvars" \
              -input=false
      - run:
          name: "Bootstrap apply - << pipeline.parameters.sel_region >>-<< pipeline.parameters.sel_bootstrap_env >>"
          command: |
            cd terraform/bootstrap
            terraform apply \
              -state="states/<< pipeline.parameters.sel_region >>-<< pipeline.parameters.sel_bootstrap_env >>.tfstate" \
              -var-file="projects/<< pipeline.parameters.sel_region >>-<< pipeline.parameters.sel_bootstrap_env >>.tfvars" \
              -input=false -auto-approve
      - run:
          name: Show outputs (SA email + suggested context name)
          command: |
            cd terraform/bootstrap
            terraform output -state="states/<< pipeline.parameters.sel_region >>-<< pipeline.parameters.sel_bootstrap_env >>.tfstate"
            echo ""
            echo "NEXT STEP: create a JSON key for the SA shown above, then"
            echo "add it as GOOGLE_CREDENTIALS in CircleCI context: gcp-<< pipeline.parameters.sel_region >>-<< pipeline.parameters.sel_bootstrap_env >>"

workflows:
  bootstrap-one-project:
    when: << pipeline.parameters.sel_run_bootstrap >>
    jobs:
      - hold-before-bootstrap:
          type: approval
      - bootstrap:
          context: gcp-bootstrap
          requires: [hold-before-bootstrap]

  manual-single-environment:
    when:
      and:
        - << pipeline.parameters.sel_manual_trigger >>
        - not: << pipeline.parameters.sel_run_bootstrap >>
    jobs:
      - validate:
          name: manual-validate
          env_path: "<< pipeline.parameters.sel_env_path >>"
          context: gcp-<< pipeline.parameters.sel_region >>-<< pipeline.parameters.sel_environment >>
      - plan:
          name: manual-plan
          env_path: "<< pipeline.parameters.sel_env_path >>"
          context: gcp-<< pipeline.parameters.sel_region >>-<< pipeline.parameters.sel_environment >>
          requires: [manual-validate]
      - hold-manual-approval:
          type: approval
          requires: [manual-plan]
          filters:
            branches:
              only: main
      - apply:
          name: manual-apply
          env_path: "<< pipeline.parameters.sel_env_path >>"
          context: gcp-<< pipeline.parameters.sel_region >>-<< pipeline.parameters.sel_environment >>
          requires: [hold-manual-approval]
          filters:
            branches:
              only: main

  auto-india-host-dev:
    when:
      and:
        - << pipeline.parameters.run-india-host-dev >>
        - not: << pipeline.parameters.sel_run_bootstrap >>
        - not: << pipeline.parameters.sel_manual_trigger >>
    jobs:
      - validate:
          name: india-host-dev-validate
